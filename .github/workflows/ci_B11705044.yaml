name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  ci:
    name: Typecheck, Prettier, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Prettier check
        id: prettier
        continue-on-error: true
        run: npm run format:check

      - name: Run tests and generate JUnit report
        id: test
        continue-on-error: true
        run: |
          mkdir -p test-results
          npm test -- --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Vitest Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-empty: false

      - name: Check final result
        if: always()
        run: |
          echo "Typecheck result: ${{ steps.typecheck.outcome }}"
          echo "Prettier result: ${{ steps.prettier.outcome }}"
          echo "Test result: ${{ steps.test.outcome }}"

          if [ "${{ steps.typecheck.outcome }}" != "success" ] || \
             [ "${{ steps.prettier.outcome }}" != "success" ] || \
             [ "${{ steps.test.outcome }}" != "success" ]; then
            echo "One or more CI checks failed."
            exit 1
          fi

          echo "All CI checks passed."
